<!-- Did took some help of AI to figure out the materialzed CSS alignment and how to add and remove a few things -->

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Podcast Tracker</title>
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons"
	rel="stylesheet">
</head>
<body>
	<div class="container">
		<header class="blue-grey darken-3 white-text p-2"
			style="padding: 10px 20px; border-radius: 0 0 8px 8px;">
			<h3>
				<i class="material-icons left" style="font-size: 40px;">mic</i>
				Podcast Playlists
			</h3>
		</header>


		<div class="card-panel">
			<h5 class="blue-text text-darken-2"
				style="font-weight: 500; margin-bottom: 25px; border-bottom: 1px solid #e0e0e0; padding-bottom: 10px;"
				th:text="${podcast.id != null ? 'Edit Podcast' : 'Add New Podcast'}">
				Add New Podcast
			</h5>

			<form th:action="@{/addPodcast}" th:object="${podcast}" method="post">
				<input type="hidden" th:field="*{id}" />

				<div class="row">
					<div class="input-field col s12 m6">
						<input id="title" type="text" th:field="*{title}" required /> <label
							for="title"
							th:classappend="${podcast.title != null ? 'active' : ''}">Title</label>
					</div>
					<div class="input-field col s6 m3">
						<input id="year" type="number" th:field="*{year}" /> <label
							for="year"
							th:classappend="${podcast.year != null ? 'active' : ''}">Year</label>
					</div>
					<div class="input-field col s6 m3">
						<input id="rating" type="number" step="0.1"
							th:field="*{starRating}" max="5" /> <label for="rating"
							th:classappend="${podcast.starRating != null ? 'active' : ''}">Rating</label>
					</div>
				</div>

				<div class="row">
					<div class="input-field col s12">
						<input id="link" type="url" th:field="*{directLink}" /> 
						<label
							for="link"
							th:classappend="${podcast.directLink != null ? 'active' : ''}">Direct Link
						</label>
					</div>
				</div>

				<div
					th:if="${podcast.id != null and !podcast.streamingServices.isEmpty()}">
					<h5 class="blue-text text-darken-2"
						style="font-weight: 500; margin-bottom: 25px; border-bottom: 1px solid #e0e0e0; padding-bottom: 10px;">
							Edit Existing Services
					</h5>
					
					<div class="row" th:each="service, stat : *{streamingServices}">
						<input type="hidden"
							th:field="*{streamingServices[__${stat.index}__].id}" />

						<div class="input-field col s12 m5">
							<input type="text"
								th:field="*{streamingServices[__${stat.index}__].name}" /> <label
								class="active">Service Name</label>
						</div>
						<div class="input-field col s12 m7">
							<input type="url"
								th:field="*{streamingServices[__${stat.index}__].serviceLink}" />
							<label class="active">Service URL</label>
						</div>
					</div>
				</div>

				<div class="row">
					<h5 class="blue-text text-darken-2"
						style="font-weight: 500; margin-top: 30px; margin-bottom: 20px;">
						Add New Streaming Services
					</h5>
					
					<div class="input-field col s12 m6">
						<input id="serviceNames" type="text" name="serviceNames"
							placeholder="Spotify, Apple" /> <label for="serviceNames"
							class="active">Service Names</label>
					</div>
					<div class="input-field col s12 m6">
						<input id="serviceLinks" type="text" name="serviceLinks"
							placeholder="http://..., http://..." /> <label
							for="serviceLinks" class="active">Service URLs</label>
					</div>
				</div>

				<button class="btn waves-effect waves-light blue darken-2"
					type="submit">
					<span
						th:text="${podcast.id != null ? 'Update Podcast' : 'Add Podcast'}">Submit</span>
					<i class="material-icons right">save</i>
				</button>
				<a th:href="@{/}" class="waves-effect btn-flat"
					th:if="${podcast.id != null}">Cancel</a>
			</form>
		</div>

		<div class="row card-panel grey lighten-4">
			<div class="col s12">
				<span style="font-weight: bold; margin-right: 15px;">Sort By:</span>
				
				<form th:action="@{/podcast/findByOrderByYearAsc}" method="post"
					style="display: inline;">
					
					<!-- Got the arrows from Google  -->
					<button class="btn-small waves-effect waves-light blue"
						type="submit">Year ↑
					</button>		
				</form>
				
				<form th:action="@{/podcast/findByOrderByStarRatingDesc}"
					method="post" style="display: inline;">
					
					<button class="btn-small waves-effect waves-light orange"
						type="submit">Rating ↓
					</button>
				</form>
				
				
				<form th:action="@{/podcast/findAllOrderedByRatingThenTitle}"
					method="post" style="display: inline;">
					
					<button class="btn-small waves-effect waves-light green"
						type="submit">Rating & Title
					</button>
				</form>
				
				<a th:href="@{/}" class="btn-small btn-flat grey-text">Default</a>
			</div>
		</div>

		<div class="row">
			<div class="col s12">
				<h5>
					Podcast List (Total: <span th:text="${podcastList.size()}"></span>)
				</h5>
				<table class="highlight responsive-table centered">
					<thead class="grey darken-2 white-text">
						<tr>
							<th>Title</th>
							<th>Year</th>
							<th>Rating</th>
							<th>Direct Link</th>
							<th>Streaming Services</th>
							<th>Actions</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="p : ${podcastList}">
							<td th:text="${p.title}" style="font-weight: bold;">Title</td>
							
							<td th:text="${p.year}">Year</td>

							<td>
								<div class="valign-wrapper" style="justify-content: center;">
									<span
										style="display: inline-block; padding: 2px 10px; border: 1.5px solid #1e88e5; border-radius: 4px; color: #1e88e5; font-weight: 700; font-size: 0.9rem; background-color: transparent;">
										<span th:text="${p.starRating}">4.5</span>
									</span>
								</div>
							</td>

							<td><a th:href="${p.directLink}" th:if="${p.directLink}"
								target="_blank" class="blue-text text-darken-2"> <i
									class="material-icons">link</i>
							</a></td>

							
							<td>
								<div
									th:if="${p.streamingServices != null and !p.streamingServices.isEmpty()}"
									style="display: flex; flex-wrap: wrap; justify-content: center; gap: 6px;">

									<a th:each="s : ${p.streamingServices}"
										th:href="${s.serviceLink}" target="_blank" class="hoverable"
										style="display: inline-flex; align-items: center; padding: 4px 12px; border: 1.5px solid #1e88e5; border-radius: 20px; color: #1e88e5; text-decoration: none; font-size: 0.85rem; font-weight: 500; transition: all 0.2s ease;">

										<i class="material-icons"
										style="font-size: 16px; margin-right: 5px;">play_arrow</i> <span
										th:text="${s.name}">Spotify</span>
									</a>

								</div> <span
								th:unless="${p.streamingServices != null and !p.streamingServices.isEmpty()}"
								class="grey-text"
								style="font-style: italic; font-size: 0.85rem;"> None
									available </span>
							</td>

							<td>
							<a th:href="@{/editPodcast(id=${p.id})}"
								class="btn-floating btn-small waves-effect waves-light blue">
									<i class="material-icons">edit</i>
							</a>
							
							
								<form th:action="@{/deletePodcast(id=${p.id})}" method="post"
									style="display: inline;">
									
									<button type="submit"
										class="btn-floating btn-small waves-effect waves-light red"
										onclick="return confirm('Delete this podcast?')">
										<i class="material-icons">delete_forever</i>
									</button>
									
								</form>
							</td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>
	</div>

	<script
		src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
</body>
</html>
